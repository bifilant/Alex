name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch buildozer.spec and remove BOM
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("buildozer.spec")

          raw = p.read_bytes()
          if raw.startswith(b"\xef\xbb\xbf"):
              raw = raw[3:]

          s = raw.decode("utf-8", errors="ignore")
          s = s.lstrip("\ufeff")

          def set_key(text, key, value):
              lines = text.splitlines()
              found = False
              out = []
              for line in lines:
                  stripped = line.strip().lstrip("\ufeff")
                  if stripped.startswith(key + " ") or stripped.startswith(key + "="):
                      out.append(f"{key} = {value}")
                      found = True
                  else:
                      out.append(line.lstrip("\ufeff"))
              if not found:
                  out.append(f"{key} = {value}")
              return "\n".join(out) + "\n"

          s = set_key(s, "requirements", "python3,kivy")
          s = set_key(s, "android.archs", "arm64-v8a")
          s = set_key(s, "android.api", "33")
          s = set_key(s, "android.minapi", "23")
          s = set_key(s, "android.ndk_api", "23")
          s = set_key(s, "p4a.bootstrap", "sdl2")
          s = set_key(s, "log_level", "2")

          p.write_bytes(s.encode("utf-8"))
          print("First bytes:", p.read_bytes()[:8])
          print("First line:", p.read_text(encoding="utf-8", errors="ignore").splitlines()[0])
          PY

      - name: Build APK in official Kivy Buildozer Docker image
        shell: bash
        run: |
          docker pull ghcr.io/kivy/buildozer:latest
          docker run --rm \
            --entrypoint /bin/bash \
            -v "$PWD":/home/user/hostcwd \
            -w /home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            -lc "python3 - <<'PY'
          from pathlib import Path
          p=Path('buildozer.spec')
          raw=p.read_bytes()
          if raw.startswith(b'\xef\xbb\xbf'):
              raw=raw[3:]
          p.write_bytes(raw)
          print('spec first bytes in docker:', p.read_bytes()[:8])
          PY
          yes | buildozer -v android debug"

      - name: Show generated files
        if: always()
        shell: bash
        run: |
          find . -maxdepth 5 -type f \( -name "*.apk" -o -name "*.aab" \) -print || true
          ls -la bin || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapillAPK-debug-apk
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/dists/*/build/outputs/apk/debug/*.apk
          if-no-files-found: error

name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch buildozer.spec
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("buildozer.spec")
          s = p.read_text(encoding="utf-8", errors="ignore")
          def set_key(text, key, value):
              lines = text.splitlines()
              found = False
              out = []
              for line in lines:
                  stripped = line.strip()
                  if stripped.startswith(key + " ") or stripped.startswith(key + "="):
                      out.append(f"{key} = {value}")
                      found = True
                  else:
                      out.append(line)
              if not found:
                  out.append(f"{key} = {value}")
              return "\n".join(out) + "\n"
          s = set_key(s, "requirements", "python3,kivy")
          s = set_key(s, "android.archs", "arm64-v8a")
          s = set_key(s, "android.api", "33")
          s = set_key(s, "android.minapi", "23")
          s = set_key(s, "android.ndk_api", "23")
          s = set_key(s, "p4a.bootstrap", "sdl2")
          s = set_key(s, "log_level", "2")
          p.write_text(s, encoding="utf-8")
          PY

      - name: Build APK in official Kivy Buildozer Docker image
        shell: bash
        run: |
          docker pull ghcr.io/kivy/buildozer:latest
          docker run --rm \
            -v "$PWD":/home/user/hostcwd \
            -w /home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            bash -lc "buildozer -v android debug"

      - name: Show generated files
        if: always()
        shell: bash
        run: |
          find . -maxdepth 3 -type f \( -name "*.apk" -o -name "*.aab" \) -print || true
          ls -la bin || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapillAPK-debug-apk
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/dists/*/build/outputs/apk/debug/*.apk
          if-no-files-found: error

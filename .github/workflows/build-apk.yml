name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch buildozer.spec
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("buildozer.spec")
          s = p.read_text(encoding="utf-8", errors="ignore")
          def set_key(text, key, value):
              lines = text.splitlines()
              found = False
              out = []
              for line in lines:
                  stripped = line.strip()
                  if stripped.startswith(key + " ") or stripped.startswith(key + "="):
                      out.append(f"{key} = {value}")
                      found = True
                  else:
                      out.append(line)
              if not found:
                  out.append(f"{key} = {value}")
              return "\n".join(out) + "\n"
          s = set_key(s, "requirements", "python3,kivy")
          s = set_key(s, "android.archs", "arm64-v8a")
          s = set_key(s, "android.api", "33")
          s = set_key(s, "android.minapi", "23")
          s = set_key(s, "android.ndk_api", "23")
          s = set_key(s, "p4a.bootstrap", "sdl2")
          s = set_key(s, "log_level", "2")
          p.write_text(s, encoding="utf-8")
          PY

      - name: Build with Buildozer Docker Action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          workdir: .
          buildozer_version: stable

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapillAPK-debug-apk
          path: ${{ steps.buildozer.outputs.filename }}
